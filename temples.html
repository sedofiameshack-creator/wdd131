<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album | WDD 131</title>
    <meta name="description" content="A responsive photo album of temples from around the world, built for WDD 131.">

    <!-- Google Fonts: Cormorant Garamond (display) + Source Sans 3 (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- Mobile-first CSS, then large-view override -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css" media="(min-width: 48rem)">

    <script src="scripts/temples.js" defer></script>
</head>

<body>

    <header class="site-header">
        <p class="site-title">Temple Album</p>

        <button id="nav-toggle" class="nav-toggle" aria-expanded="false" aria-controls="primary-nav"
            aria-label="Toggle navigation menu">
            <span class="nav-toggle__icon" aria-hidden="true"></span>
        </button>

        <nav id="primary-nav" class="primary-nav">
            <ul>
                <li><a href="#" class="nav-link is-active" data-filter="all">Home</a></li>
                <li><a href="#" class="nav-link" data-filter="old">Old</a></li>
                <li><a href="#" class="nav-link" data-filter="new">New</a></li>
                <li><a href="#" class="nav-link" data-filter="large">Large</a></li>
                <li><a href="#" class="nav-link" data-filter="small">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>A Gallery of Temples</h1>
        <p class="lede">Nine temples, spanning a century of design, from towering landmarks to quiet neighborhood
            chapels. Use the menu above to sort by age or scale.</p>

        <div class="temple-grid">

            <figure class="temple-card" data-category="old large">
                <img src="images/frankfurt.jpg" alt="Illustrated silhouette of the Salt Lake Temple" width="400"
                    height="300" loading="lazy">
                <figcaption>Frankfurt Germany Temple<span>Frankfurt, GERMANY</span>
                </figcaption>
            </figure>

            <figure class="temple-card" data-category="old small">
                <img src="images/denver.jpg" alt="Illustrated silhouette of the Denver Colorado Temple" width="400"
                    height="300" loading="lazy">
                <figcaption>Denver Colorado Temple<span>Denver, COLORADO</span></figcaption>
            </figure>

            <figure class="temple-card" data-category="old large">
                <img src="images/cordoba.jpg" alt="Illustrated silhouette of the Córdoba Argentina Temple" width="400"
                    height="300" loading="lazy">
                <figcaption>Córdoba Argentina Temple <span>Córdoba, Argentina</span>
                </figcaption>
            </figure>

            <figure class="temple-card" data-category="new large">
                <img src="images/chicago.jpg" alt="Illustrated silhouette of the Chicago Illinois Temple" width="400"
                    height="300" loading="lazy">
                <figcaption>Chicago Illinois Temple<span>Chicago,USA</span></figcaption>
            </figure>

            <figure class="temple-card" data-category="new small">
                <img src="images/boise.jpg" alt="Illustrated silhouette of the Boise Idaho Temple" width="400"
                    height="300" loading="lazy">
                <figcaption>Boise Idaho Temple<span>Boise, Idaho</span>
                </figcaption>
            </figure>

            <figure class="temple-card" data-category="new small">
                <img src="images/billings.jpg" alt="Illustrated silhouette of the Billings Montana Temple" width="400"
                    height="300" loading="lazy">
                <figcaption>Billings Montana Temple<span>Billings, Montana</span></figcaption>
            </figure>

            <figure class="temple-card" data-category="old large">
                <img src="images/albuquerque.jpg" alt="Illustrated silhouette of the Albuquerque New Mexico Temple"
                    width="400" height="300" loading="lazy">
                <figcaption>Albuquerque New Mexico Temple <span>Albuquerque, New Mexico</span></figcaption>
            </figure>

            <figure class="temple-card" data-category="new large">
                <img src="images/arequipa.jpeg" alt="Illustrated silhouette of the Arequipa Peru Temple" width="400"
                    height="300" loading="lazy">
                <figcaption>Arequipa Peru Temple <span>Arequipa, Peru</span>
                </figcaption>
            </figure>

            <figure class="temple-card" data-category="old small">
                <img src="images/belem.jpg" alt="Illustrated silhouette of the Belém Brazil Temple" width="400"
                    height="300" loading="lazy">
                <figcaption>Belém Brazil Temple<span>Belém, Brazil</span></figcaption>
            </figure>

        </div>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Temple Album &middot; Meshack Sedofia</p>
        <p id="last-modified"></p>
    </footer>

</body>

</html>
